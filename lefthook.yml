pre-commit:
  parallel: true
  commands:
    check-web:
      glob: "web/**/*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: cd web && bun run lint -- --max-warnings=0
    typecheck-web:
      run: cd web && bunx tsc -b
    format-markdown:
      files: git diff --cached --name-only --diff-filter=ACMR -- '*.md'
      run: ./node_modules/.bin/dprint fmt {files}
      stage_fixed: true
    fmt:
      glob: "*.{rs}"
      run: cargo fmt
      stage_fixed: true
    check:
      glob: "*.{rs}"
      run: cargo check --locked --all-targets --all-features

commit-msg:
  commands:
    commitlint:
      run: ./node_modules/.bin/commitlint --edit {1}

post-checkout:
  commands:
    worktree-bootstrap:
      run: ./scripts/sync-worktree-resources.sh
