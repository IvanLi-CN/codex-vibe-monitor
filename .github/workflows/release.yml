name: Release

on:
  workflow_run:
    workflows:
      - CI Main
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA on main to release or backfill
        required: true
        type: string

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORM_AMD64: linux/amd64
  PLATFORM_ARM64: linux/arm64
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  release-meta:
    name: Release Meta (intent + version + tags)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.run_attempt == 1) }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      target_sha: ${{ steps.target.outputs.target_sha }}
      release_enabled: ${{ steps.intent.outputs.release_enabled }}
      release_bump: ${{ steps.intent.outputs.release_bump }}
      release_channel: ${{ steps.intent.outputs.release_channel }}
      pr_number: ${{ steps.intent.outputs.pr_number }}
      pr_title: ${{ steps.intent.outputs.pr_title }}
      image_name_lower: ${{ steps.image-name.outputs.image_name_lower }}
      app_effective_version: ${{ steps.version.outputs.app_effective_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_prerelease: ${{ steps.version.outputs.release_prerelease }}
      tags_csv: ${{ steps.image-tags.outputs.tags_csv }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target commit
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target_sha="${{ inputs.commit_sha }}"
          else
            target_sha="${{ github.event.workflow_run.head_sha }}"
          fi

          if [[ ! "${target_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid commit_sha: ${target_sha}" >&2
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git cat-file -e "${target_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags origin "${target_sha}"
          fi
          git cat-file -e "${target_sha}^{commit}"

          if ! git merge-base --is-ancestor "${target_sha}" origin/main; then
            echo "Commit ${target_sha} is not contained in origin/main" >&2
            exit 1
          fi

          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"

      - name: Resolve release intent (PR labels)
        id: intent
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        with:
          script: |
            const { owner, repo } = context.repo
            const sha = process.env.TARGET_SHA
            const allowedTypes = new Set([
              'type:patch',
              'type:minor',
              'type:major',
              'type:docs',
              'type:skip',
            ])
            const allowedChannels = new Set(['channel:stable', 'channel:rc'])

            if (!sha) {
              core.setFailed('Missing TARGET_SHA')
              return
            }

            const prsResp = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
              mediaType: { previews: ['groot'] },
            })
            const prs = prsResp.data || []

            if (prs.length !== 1) {
              core.notice(
                `Release disabled: expected exactly 1 PR associated with commit ${sha}, got ${prs.length}`
              )
              core.setOutput('release_enabled', 'false')
              return
            }

            const pr = prs[0]
            const labels = (pr.labels || []).map(l => l?.name).filter(Boolean)
            const typeLabels = labels.filter(l => l.startsWith('type:'))
            const channelLabels = labels.filter(l => l.startsWith('channel:'))

            const problems = []
            if (typeLabels.length !== 1) {
              problems.push(
                `Expected exactly 1 type:* label, got ${typeLabels.length}: ${typeLabels.join(', ') || '(none)'}`
              )
            } else if (!allowedTypes.has(typeLabels[0])) {
              problems.push(`Unknown type label: ${typeLabels[0]}`)
            }

            if (channelLabels.length !== 1) {
              problems.push(
                `Expected exactly 1 channel:* label, got ${channelLabels.length}: ${channelLabels.join(', ') || '(none)'}`
              )
            } else if (!allowedChannels.has(channelLabels[0])) {
              problems.push(`Unknown channel label: ${channelLabels[0]}`)
            }

            if (problems.length > 0) {
              core.setFailed(problems.join('\n'))
              return
            }

            const typeLabel = typeLabels[0]
            const channelLabel = channelLabels[0]

            core.setOutput('pr_number', String(pr.number))
            core.setOutput('pr_title', pr.title || '')

            if (typeLabel === 'type:docs' || typeLabel === 'type:skip') {
              core.notice(`Release disabled: ${typeLabel} (${channelLabel})`)
              core.setOutput('release_enabled', 'false')
              return
            }

            core.setOutput('release_enabled', 'true')
            core.setOutput('release_bump', typeLabel.split(':', 2)[1])
            core.setOutput('release_channel', channelLabel.split(':', 2)[1])

      - name: Validate manual backfill target passed CI Main
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        with:
          script: |
            const { owner, repo } = context.repo
            const sha = process.env.TARGET_SHA
            if (!sha) {
              core.setFailed('Missing TARGET_SHA')
              return
            }

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'ci-main.yml',
              branch: 'main',
              event: 'push',
              head_sha: sha,
              status: 'completed',
              per_page: 100,
            })

            const passed = (runs.data.workflow_runs || []).some(run => run.head_sha === sha && run.conclusion === 'success')
            if (!passed) {
              core.setFailed(`Manual backfill requires a successful CI Main run for ${sha}`)
              return
            }

            core.notice(`Verified successful CI Main history for ${sha}`)

      - name: Compute lowercase image name
        if: steps.intent.outputs.release_enabled == 'true'
        id: image-name
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LOWER=${lower}" >> "$GITHUB_ENV"
          echo "image_name_lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Checkout target commit
        if: steps.intent.outputs.release_enabled == 'true'
        shell: bash
        env:
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        run: |
          set -euo pipefail
          git checkout --detach "$TARGET_SHA"

      - name: Compute effective version
        if: steps.intent.outputs.release_enabled == 'true'
        shell: bash
        env:
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
          RELEASE_BUMP: ${{ steps.intent.outputs.release_bump }}
          RELEASE_CHANNEL: ${{ steps.intent.outputs.release_channel }}
        run: ./.github/scripts/compute-version.sh

      - name: Export version outputs
        if: steps.intent.outputs.release_enabled == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail
          echo "app_effective_version=${APP_EFFECTIVE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_prerelease=${RELEASE_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        if: steps.intent.outputs.release_enabled == 'true'
        id: image-tags
        shell: bash
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}"
          if [[ "${RELEASE_CHANNEL}" == "stable" ]]; then
            echo "tags_csv=${image}:v${APP_EFFECTIVE_VERSION},${image}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags_csv=${image}:v${APP_EFFECTIVE_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate platforms for smoke gate
        if: steps.intent.outputs.release_enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          required_platforms=("${PLATFORM_AMD64}" "${PLATFORM_ARM64}")
          normalized=",${PLATFORMS// /},"
          for platform in "${required_platforms[@]}"; do
            if [[ "${normalized}" != *",${platform},"* ]]; then
              echo "Missing required platform in PLATFORMS=${PLATFORMS}: ${platform}" >&2
              exit 1
            fi
          done

  docker-amd64:
    name: Build + Smoke + Push Candidate (linux/amd64)
    runs-on: ubuntu-latest
    needs: [release-meta]
    if: needs.release-meta.outputs.release_enabled == 'true'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build smoke image (linux/amd64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM_AMD64 }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:smoke-${{ github.run_id }}-${{ github.run_attempt }}-amd64
            ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:candidate-${{ github.run_id }}-${{ github.run_attempt }}-amd64
          build-args: |
            APP_EFFECTIVE_VERSION=${{ needs.release-meta.outputs.app_effective_version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:buildcache-amd64,mode=max

      - name: Smoke test image (linux/amd64)
        shell: bash
        env:
          SMOKE_TAG: ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:smoke-${{ github.run_id }}-${{ github.run_attempt }}-amd64
          SMOKE_CONTAINER_NAME: smoke-codex-vibe-monitor-amd64-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_AMD64 }}
        run: ./.github/scripts/smoke-test-image.sh "$SMOKE_TAG"

      - name: Push candidate image (linux/amd64)
        shell: bash
        env:
          IMAGE_NAME_LOWER: ${{ needs.release-meta.outputs.image_name_lower }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
          suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          candidate_amd64="${image}:candidate-${suffix}-amd64"
          echo "[push] ${candidate_amd64}"
          docker push "${candidate_amd64}"

  docker-arm64:
    name: Build + Smoke + Push Candidate (linux/arm64)
    runs-on: ubuntu-24.04-arm
    needs: [release-meta]
    if: needs.release-meta.outputs.release_enabled == 'true'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build smoke image (linux/arm64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM_ARM64 }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:smoke-${{ github.run_id }}-${{ github.run_attempt }}-arm64
            ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:candidate-${{ github.run_id }}-${{ github.run_attempt }}-arm64
          build-args: |
            APP_EFFECTIVE_VERSION=${{ needs.release-meta.outputs.app_effective_version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:buildcache-arm64,mode=max

      - name: Smoke test image (linux/arm64)
        shell: bash
        env:
          SMOKE_TAG: ${{ env.REGISTRY }}/${{ needs.release-meta.outputs.image_name_lower }}:smoke-${{ github.run_id }}-${{ github.run_attempt }}-arm64
          SMOKE_CONTAINER_NAME: smoke-codex-vibe-monitor-arm64-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_ARM64 }}
          SMOKE_TIMEOUT_SECS: "120"
        run: ./.github/scripts/smoke-test-image.sh "$SMOKE_TAG"

      - name: Push candidate image (linux/arm64)
        shell: bash
        env:
          IMAGE_NAME_LOWER: ${{ needs.release-meta.outputs.image_name_lower }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
          suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          candidate_arm64="${image}:candidate-${suffix}-arm64"
          echo "[push] ${candidate_arm64}"
          docker push "${candidate_arm64}"

  release-publish:
    name: Release Publish (manifest + tag + GitHub Release)
    runs-on: ubuntu-latest
    needs: [release-meta, docker-amd64, docker-arm64]
    if: needs.release-meta.outputs.release_enabled == 'true'
    permissions:
      contents: write
      packages: write
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release manifest tags from smoke-verified images
        shell: bash
        env:
          TAGS_CSV: ${{ needs.release-meta.outputs.tags_csv }}
          IMAGE_NAME_LOWER: ${{ needs.release-meta.outputs.image_name_lower }}
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
          suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          candidate_amd64="${image}:candidate-${suffix}-amd64"
          candidate_arm64="${image}:candidate-${suffix}-arm64"

          IFS=',' read -r -a tags <<< "${TAGS_CSV}"
          for tag in "${tags[@]}"; do
            [[ -z "${tag}" ]] && continue
            echo "[manifest] ${tag} <= ${candidate_amd64}, ${candidate_arm64}"
            for attempt in 1 2 3 4 5; do
              if docker buildx imagetools create --tag "${tag}" "${candidate_amd64}" "${candidate_arm64}" 2>"/tmp/imagetools-create-${attempt}.err"; then
                break
              fi
              if [[ "${attempt}" == "5" ]]; then
                echo "[manifest] failed after ${attempt} attempts for ${tag}" >&2
                if [[ -s "/tmp/imagetools-create-${attempt}.err" ]]; then
                  cat "/tmp/imagetools-create-${attempt}.err" >&2
                fi
                exit 1
              fi
              sleep_secs=$((attempt * 3))
              echo "[manifest] retry in ${sleep_secs}s (${attempt}/5): ${tag}" >&2
              sleep "${sleep_secs}"
            done
          done

      - name: Verify pushed manifest platforms
        shell: bash
        env:
          TAGS_CSV: ${{ needs.release-meta.outputs.tags_csv }}
          REQUIRED_PLATFORMS: ${{ env.PLATFORMS }}
        run: |
          set -euo pipefail
          IFS=',' read -r -a tags <<< "${TAGS_CSV}"
          for tag in "${tags[@]}"; do
            [[ -z "${tag}" ]] && continue
            echo "[verify] ${tag}"
            for attempt in 1 2 3 4 5; do
              if raw_json="$(docker buildx imagetools inspect "${tag}" --raw 2>"/tmp/imagetools-${attempt}.err")"; then
                if RAW_JSON="${raw_json}" python3 ./.github/scripts/verify_manifest_platforms.py "${tag}"; then
                  break
                fi
              fi

              if [[ "${attempt}" == "5" ]]; then
                echo "[verify] failed after ${attempt} attempts for ${tag}" >&2
                if [[ -s "/tmp/imagetools-${attempt}.err" ]]; then
                  cat "/tmp/imagetools-${attempt}.err" >&2
                fi
                exit 1
              fi

              sleep_secs=$((attempt * 3))
              echo "[verify] retry in ${sleep_secs}s (${attempt}/5): ${tag}" >&2
              sleep "${sleep_secs}"
            done
          done

      - name: Create and push git tag
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tag="${RELEASE_TAG}"
          sha="${TARGET_SHA}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing="$(git rev-list -n 1 "${tag}")"
            if [[ "${existing}" != "${sha}" ]]; then
              echo "Tag ${tag} already exists but points to ${existing} (expected ${sha})" >&2
              exit 1
            fi
            echo "Tag ${tag} already exists and points to ${sha}."
          else
            git tag -a "${tag}" "${sha}" -m "release ${APP_EFFECTIVE_VERSION}"
          fi

          git push origin "${tag}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          RELEASE_PRERELEASE: ${{ needs.release-meta.outputs.release_prerelease }}
          RELEASE_PR_NUMBER: ${{ needs.release-meta.outputs.pr_number }}
          RELEASE_PR_TITLE: ${{ needs.release-meta.outputs.pr_title }}
          RELEASE_BUMP: ${{ needs.release-meta.outputs.release_bump }}
          RELEASE_CHANNEL: ${{ needs.release-meta.outputs.release_channel }}
        with:
          script: |
            const { owner, repo } = context.repo
            const tag = process.env.RELEASE_TAG
            const prerelease = process.env.RELEASE_PRERELEASE === 'true'
            const prNumber = process.env.RELEASE_PR_NUMBER
            const prTitle = process.env.RELEASE_PR_TITLE
            const bump = process.env.RELEASE_BUMP
            const channel = process.env.RELEASE_CHANNEL
            const targetSha = process.env.TARGET_SHA

            if (!tag) {
              core.setFailed('Missing RELEASE_TAG')
              return
            }

            let existing = null
            try {
              existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
            } catch (err) {
              if (err.status !== 404) throw err
            }

            if (existing) {
              core.notice(`GitHub Release already exists for tag ${tag}, skipping.`)
              return
            }

            const bodyLines = [
              prNumber ? `PR: #${prNumber} ${prTitle || ''}`.trim() : 'PR: (unknown)',
              `Channel: ${channel || '(unknown)'}`,
              `Bump: ${bump || '(unknown)'}`,
              `Commit: ${targetSha || '(unknown)'}`,
            ]

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              prerelease,
              body: bodyLines.join('\n'),
            })

            core.notice(`Created GitHub Release for tag ${tag}`)
