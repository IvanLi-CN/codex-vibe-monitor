name: Label Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review, edited]

concurrency:
  group: label-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  validate-pr-labels:
    name: Validate PR labels
    if: ${{ github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 1
          path: trusted
          persist-credentials: false

      - name: Checkout candidate pull request
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          path: candidate
          persist-credentials: false

      - name: Detect rollout contract support
        id: rollout
        shell: bash
        run: |
          set -euo pipefail
          final_topology_paths=(
            "trusted/.github/workflows/ci-pr.yml"
            "trusted/.github/workflows/ci-main.yml"
            "trusted/.github/workflows/release.yml"
          )
          missing_final_sources=0
          for path in "${final_topology_paths[@]}"; do
            if [ ! -f "$path" ]; then
              missing_final_sources=1
              break
            fi
          done

          if [ "$missing_final_sources" -eq 1 ]; then
            echo "::warning::Base branch ${GITHUB_BASE_REF} does not contain the final split-topology contract yet; skipping trusted contract validation during rollout and keeping trusted metadata_gate.py pinned to base."
            echo "supports_final_contract=false" >> "$GITHUB_OUTPUT"
          else
            echo "supports_final_contract=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate trusted label-gate contract
        if: steps.rollout.outputs.supports_final_contract == 'true'
        run: |
          python3 trusted/.github/scripts/check_quality_gates_contract.py \
            --repo-root "$PWD/candidate" \
            --declaration "$PWD/candidate/.github/quality-gates.json" \
            --metadata-script "$PWD/trusted/.github/scripts/metadata_gate.py"

      - name: Evaluate PR labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 trusted/.github/scripts/metadata_gate.py label
