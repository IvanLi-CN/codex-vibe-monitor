name: Label Gate

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review, edited]

concurrency:
  group: label-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  label-gate:
    name: Validate PR labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: trusted
          persist-credentials: false

      - name: Checkout candidate changes
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false

      - name: Validate workflow contract
        run: |
          python3 trusted/.github/scripts/check_quality_gates_contract.py \
            --repo-root candidate \
            --declaration candidate/.github/quality-gates.json \
            --metadata-script trusted/.github/scripts/metadata_gate.py

      - name: Validate release intent labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 trusted/.github/scripts/metadata_gate.py label
