name: CI PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORM_AMD64: linux/amd64
  PLATFORM_ARM64: linux/arm64
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          components: rustfmt

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --locked --all-targets --all-features

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install repo tooling
        run: bun install --frozen-lockfile

      - name: Install front-end dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Install docs-site dependencies
        run: bun install --cwd docs-site --frozen-lockfile

      - name: Bun-first guard
        run: bun run check:bun-first

      - name: Check quality-gates scripts
        run: |
          python3 -m py_compile \
            .github/scripts/metadata_gate.py \
            .github/scripts/check_live_quality_gates.py \
            .github/scripts/check_quality_gates_contract.py \
            .github/scripts/release_snapshot.py \
            .github/scripts/verify_manifest_platforms.py

      - name: Resolve trusted quality-gates sources
        id: trusted-quality-gates
        shell: bash
        run: |
          set -euo pipefail
          trusted_root="$RUNNER_TEMP/trusted-quality-gates"
          mkdir -p "$trusted_root/.github/scripts"
          paths=(
            ".github/quality-gates.json"
            ".github/scripts/check_quality_gates_contract.py"
            ".github/scripts/check_live_quality_gates.py"
            ".github/scripts/metadata_gate.py"
          )
          final_topology_paths=(
            ".github/workflows/ci-pr.yml"
            ".github/workflows/ci-main.yml"
            ".github/workflows/release.yml"
          )
          source_ref="HEAD"
          source_kind="current-branch"
          supports_final_topology="true"
          base_branch=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_branch="${{ github.base_ref }}"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            queue_prefix="refs/heads/gh-readonly-queue/"
            if [[ "${GITHUB_REF}" != "${queue_prefix}"* ]]; then
              echo "::error::merge_group ref ${GITHUB_REF} must use the gh-readonly-queue/<base_branch>/... format."
              exit 1
            fi
            queue_ref="${GITHUB_REF#${queue_prefix}}"
            if [[ "${queue_ref}" != */pr-* ]]; then
              echo "::error::Unable to derive the merge_group base branch from ${GITHUB_REF}."
              exit 1
            fi
            base_branch="${queue_ref%%/pr-*}"
            if [ -z "${base_branch}" ]; then
              echo "::error::Unable to derive the merge_group base branch from ${GITHUB_REF}."
              exit 1
            fi
          fi

          if [ -n "${base_branch}" ]; then
            git fetch --no-tags --depth=1 origin "${base_branch}"
            source_ref="origin/${base_branch}"
            source_kind="base-branch"
            if [ "${{ github.event_name }}" = "merge_group" ]; then
              source_kind="merge-group-base-branch"
            fi
            event_name="${{ github.event_name }}"
            missing_paths=()
            for path in "${paths[@]}" "${final_topology_paths[@]}"; do
              if ! git cat-file -e "${source_ref}:${path}" 2>/dev/null; then
                missing_paths+=("${path}")
              fi
            done
            if [ "${#missing_paths[@]}" -gt 0 ]; then
              echo "::warning::Base branch ${base_branch} does not yet contain the final split-topology quality-gates sources required for ${event_name}; keeping trusted scripts pinned to base and skipping trusted final-topology checks during rollout."
              supports_final_topology="false"
              source_kind="bootstrap-compatible-base-branch"
              if [ "${{ github.event_name }}" = "merge_group" ]; then
                source_kind="merge-group-bootstrap-compatible-base-branch"
              fi
            fi
          fi

          for path in "${paths[@]}"; do
            mkdir -p "$trusted_root/$(dirname "$path")"
            if [ "$source_ref" = "HEAD" ]; then
              cp "$path" "$trusted_root/$path"
            else
              git show "${source_ref}:${path}" > "$trusted_root/$path"
            fi
          done

          {
            echo "source_kind=$source_kind"
            echo "source_ref=$source_ref"
            echo "supports_final_topology=$supports_final_topology"
            echo "trusted_root=$trusted_root"
            echo "declaration=$trusted_root/.github/quality-gates.json"
            echo "contract_script=$trusted_root/.github/scripts/check_quality_gates_contract.py"
            echo "live_script=$trusted_root/.github/scripts/check_live_quality_gates.py"
            echo "metadata_script=$trusted_root/.github/scripts/metadata_gate.py"
          } >> "$GITHUB_OUTPUT"

      - name: Quality-gates contract check
        if: steps.trusted-quality-gates.outputs.supports_final_topology == 'true'
        run: |
          python3 "${{ steps.trusted-quality-gates.outputs.contract_script }}" \
            --repo-root "$PWD" \
            --declaration "${{ steps.trusted-quality-gates.outputs.declaration }}" \
            --metadata-script "${{ steps.trusted-quality-gates.outputs.metadata_script }}"

      - name: Quality-gates live rules check
        if: steps.trusted-quality-gates.outputs.supports_final_topology == 'true'
        env:
          QUALITY_GATES_LIVE_RULES_MODE: require
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 "${{ steps.trusted-quality-gates.outputs.live_script }}" \
            --repo "${{ github.repository }}" \
            --declaration "${{ steps.trusted-quality-gates.outputs.declaration }}"

      - name: Quality gates self-tests
        run: |
          bash .github/scripts/test-quality-gates-contract.sh
          bash .github/scripts/test-release-snapshot.sh
          bash .github/scripts/test-live-quality-gates.sh

      - name: Front-end lint
        working-directory: web
        run: bun run lint

      - name: Build Storybook static site
        working-directory: web
        run: bun run storybook:build -- --quiet

      - name: Compute DOCS_BASE
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          if [[ "${repo}" == "${owner}.github.io" ]]; then
            echo "DOCS_BASE=/" >> "$GITHUB_ENV"
          else
            echo "DOCS_BASE=/${repo}/" >> "$GITHUB_ENV"
          fi

      - name: Build docs site
        shell: bash
        run: |
          set -euo pipefail
          cd docs-site
          DOCS_BASE="${DOCS_BASE}" bun run build

      - name: Assemble public docs site smoke check
        shell: bash
        run: |
          set -euo pipefail
          bash ./.github/scripts/assemble-pages-site.sh docs-site/doc_build web/storybook-static .tmp/pages-site
          test -f .tmp/pages-site/index.html
          test -f .tmp/pages-site/storybook/index.html
          test -f .tmp/pages-site/storybook.html
          grep -q "${DOCS_BASE}storybook.html" .tmp/pages-site/index.html

  frontend-tests:
    name: Front-end Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install front-end dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run front-end Vitest suite
        working-directory: web
        run: bun run test

  records-overlay-e2e:
    name: Records Overlay E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install front-end dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: web
        run: bunx playwright install --with-deps chromium

      - name: Start Vite dev server
        working-directory: web
        run: |
          bun run dev -- --host 127.0.0.1 --port 60080 > /tmp/codex-vibe-monitor-vite.log 2>&1 &
          echo $! > /tmp/codex-vibe-monitor-vite.pid

      - name: Wait for Vite readiness
        run: |
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:60080/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Vite dev server failed to start within 60 seconds."
          cat /tmp/codex-vibe-monitor-vite.log || true
          exit 1

      - name: Run records overlay Playwright regression
        working-directory: web
        run: bun run test:e2e -- records-filter-overlay.spec.ts

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: records-overlay-playwright-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore

      - name: Stop Vite dev server
        if: always()
        run: |
          if [ -f /tmp/codex-vibe-monitor-vite.pid ]; then
            kill "$(cat /tmp/codex-vibe-monitor-vite.pid)" || true
          fi

  unit-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        run: cargo test --locked --all-features

  build:
    name: Build Artifacts
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke image (linux/amd64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: ${{ env.PLATFORM_AMD64 }}
          tags: codex-vibe-monitor:pr-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            APP_EFFECTIVE_VERSION=pr-${{ github.run_id }}-${{ github.run_attempt }}
          cache-from: type=gha,scope=pr-smoke-amd64
          cache-to: type=gha,mode=max,scope=pr-smoke-amd64

      - name: Smoke test image (linux/amd64)
        shell: bash
        env:
          SMOKE_TAG: codex-vibe-monitor:pr-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_CONTAINER_NAME: smoke-codex-vibe-monitor-pr-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_AMD64 }}
        run: ./.github/scripts/smoke-test-image.sh "$SMOKE_TAG"
