name: Docs Pages

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'web/**'
      - '.github/workflows/docs-pages.yml'
      - '.github/scripts/assemble-pages-site.sh'
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'web/**'
      - '.github/workflows/docs-pages.yml'
      - '.github/scripts/assemble-pages-site.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Compute DOCS_BASE
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          if [[ "${repo}" == "${owner}.github.io" ]]; then
            echo "DOCS_BASE=/" >> "$GITHUB_ENV"
          else
            echo "DOCS_BASE=/${repo}/" >> "$GITHUB_ENV"
          fi

      - name: Install docs dependencies
        run: bun install --cwd docs-site --frozen-lockfile

      - name: Build docs site
        shell: bash
        run: |
          set -euo pipefail
          cd docs-site
          DOCS_BASE="${DOCS_BASE}" bun run build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-build
          path: docs-site/doc_build
          retention-days: 1
          if-no-files-found: error

  build-storybook:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install Storybook dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build Storybook
        shell: bash
        run: |
          set -euo pipefail
          cd web
          bun run storybook:build -- --quiet

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v7
        with:
          name: storybook-static-build
          path: web/storybook-static
          retention-days: 1
          if-no-files-found: error

  build-demo:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Compute DOCS_BASE
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          if [[ "${repo}" == "${owner}.github.io" ]]; then
            echo "DOCS_BASE=/" >> "$GITHUB_ENV"
          else
            echo "DOCS_BASE=/${repo}/" >> "$GITHUB_ENV"
          fi

      - name: Install Web Demo dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build Web Demo
        working-directory: web
        run: VITE_DEPLOY_BASE="${DOCS_BASE}demo/" bun run demo:build

      - name: Upload Web Demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-demo-build
          path: web/demo-dist
          retention-days: 1
          if-no-files-found: error

  assemble-pages:
    runs-on: ubuntu-24.04
    needs: [build-docs, build-storybook, build-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-site-build
          path: .tmp/docs-site

      - name: Download Storybook artifact
        uses: actions/download-artifact@v8
        with:
          name: storybook-static-build
          path: .tmp/storybook-static

      - name: Download Web Demo artifact
        uses: actions/download-artifact@v8
        with:
          name: web-demo-build
          path: .tmp/web-demo

      - name: Assemble Pages site
        shell: bash
        run: |
          set -euo pipefail
          bash ./.github/scripts/assemble-pages-site.sh .tmp/docs-site .tmp/storybook-static .tmp/web-demo .tmp/pages-site

      - name: Smoke check assembled site
        shell: bash
        run: |
          set -euo pipefail
          test -f .tmp/pages-site/index.html
          test -f .tmp/pages-site/storybook/index.html
          test -f .tmp/pages-site/demo/index.html
          test -f .tmp/pages-site/demo/mockServiceWorker.js
          test -f .tmp/pages-site/storybook.html
          grep -q '/storybook.html' .tmp/pages-site/index.html
          grep -q '正在跳转到 Storybook' .tmp/pages-site/storybook.html
          grep -q './sb-manager/runtime.js' .tmp/pages-site/storybook/index.html

      - name: Upload assembled Pages site artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-site-build
          path: .tmp/pages-site
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    needs: [assemble-pages]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download assembled Pages site artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-site-build
          path: .tmp/pages-site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .tmp/pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
