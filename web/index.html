<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Application Identity -->
    <title>Codex Vibe Monitor</title>
    <meta name="application-name" content="Codex Vibe Monitor" />
    <meta
      name="description"
      content="Self-hosted observability workspace for OpenAI-compatible proxy traffic, request records, routing, and upstream account pools."
    />
    <meta name="robots" content="index,follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Theming -->
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="color-scheme" content="light dark" />

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" type="image/png" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Codex Vibe Monitor" />
    <meta
      property="og:description"
      content="Self-hosted observability workspace for OpenAI-compatible proxy traffic, request records, routing, and upstream account pools."
    />
    <meta property="og:image" content="/social-preview.png" />
    <meta property="og:image:alt" content="Codex Vibe Monitor social preview" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Codex Vibe Monitor" />
    <meta
      name="twitter:description"
      content="Self-hosted observability workspace for OpenAI-compatible proxy traffic, request records, routing, and upstream account pools."
    />
    <meta name="twitter:image" content="/social-preview.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
